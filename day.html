<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日打卡 · 猿辅导英语</title>
<style>
  :root {
    --primary: #FF6B35;
    --primary-light: #FF8C5A;
    --secondary: #4ECDC4;
    --bg: #FFF8F4;
    --card-bg: #FFFFFF;
    --text: #2D3142;
    --text-light: #7B7F9E;
    --done: #52C41A;
    --wrong: #FF4D4F;
    --shadow: 0 4px 16px rgba(255,107,53,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ── Top Bar ── */
  .topbar {
    background: linear-gradient(135deg, #FF6B35 0%, #FF4E4E 100%);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .back-btn {
    color: #fff;
    font-size: 20px;
    text-decoration: none;
    line-height: 1;
  }
  .topbar-info { flex: 1; }
  .topbar-title { color: #fff; font-size: 16px; font-weight: 700; }
  .topbar-sub { color: rgba(255,255,255,0.8); font-size: 12px; margin-top: 2px; }
  .topbar-day {
    background: rgba(255,255,255,0.22);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
  }

  /* ── Progress Dots ── */
  .q-progress {
    padding: 14px 16px 6px;
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .q-dot {
    width: 28px; height: 6px;
    background: #FFD5C5;
    border-radius: 3px;
    transition: background 0.3s;
    flex: 1;
  }
  .q-dot.answered { background: var(--primary); }
  .q-dot.correct { background: var(--done); }
  .q-dot.wrong { background: var(--wrong); }
  .q-counter {
    font-size: 12px;
    color: var(--text-light);
    margin-left: 4px;
    white-space: nowrap;
  }

  /* ── Question Card ── */
  .q-area { padding: 12px 16px; }
  .q-type-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 10px;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }
  .badge-vocab { background: #FFF0E6; color: #FF6B35; }
  .badge-grammar { background: #E6F7FF; color: #1890FF; }
  .badge-sentence { background: #F6FFED; color: #52C41A; }

  .q-card {
    background: #fff;
    border-radius: 16px;
    padding: 20px 18px;
    box-shadow: var(--shadow);
    min-height: 200px;
  }
  .q-num {
    font-size: 11px;
    color: var(--text-light);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .q-text {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 20px;
  }
  .q-text em {
    font-style: normal;
    color: var(--primary);
    border-bottom: 2px solid var(--primary-light);
  }

  /* ── Options ── */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    background: #F8F8FB;
    border: 2px solid #EAEAF0;
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 15px;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: inherit;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--primary-light);
    background: #FFF3EE;
  }
  .option-btn.selected { border-color: var(--primary); background: #FFF0E6; }
  .option-btn.correct { border-color: var(--done); background: #F6FFED; color: #389E0D; }
  .option-btn.wrong { border-color: var(--wrong); background: #FFF2F0; color: #CF1322; }
  .option-btn:disabled { cursor: default; }
  .opt-key {
    width: 26px; height: 26px;
    border-radius: 8px;
    background: #EAEAF0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .option-btn.selected .opt-key { background: var(--primary); color: #fff; }
  .option-btn.correct .opt-key { background: var(--done); color: #fff; }
  .option-btn.wrong .opt-key { background: var(--wrong); color: #fff; }

  /* ── Sentence Build ── */
  .words-source {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 16px;
  }
  .word-chip {
    background: #F0F4FF;
    border: 2px solid #D0DAFF;
    color: #4060CC;
    border-radius: 10px;
    padding: 6px 13px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .word-chip:hover:not(.used) { background: #E0E8FF; border-color: #8899EE; }
  .word-chip.used { opacity: 0.3; cursor: default; }
  .sentence-area {
    min-height: 52px;
    background: #F8F8FB;
    border: 2px dashed #DADADF;
    border-radius: 12px;
    padding: 10px 14px;
    display: flex; flex-wrap: wrap; gap: 8px;
    align-items: center;
    cursor: pointer;
    margin-bottom: 12px;
    transition: border-color 0.15s;
  }
  .sentence-area:hover { border-color: var(--primary-light); }
  .sentence-area.correct { border-color: var(--done); background: #F6FFED; }
  .sentence-area.wrong { border-color: var(--wrong); background: #FFF2F0; }
  .placed-chip {
    background: #fff;
    border: 2px solid var(--primary);
    color: var(--primary);
    border-radius: 10px;
    padding: 5px 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .placed-chip:hover { background: #FFF0E6; }
  .hint-area {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 4px;
  }
  .answer-tip {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    display: none;
  }
  .answer-tip.correct { background: #F6FFED; color: #389E0D; display: block; }
  .answer-tip.wrong { background: #FFF2F0; color: #CF1322; display: block; }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 1px solid #F0F0F0;
    padding: 12px 16px;
    display: flex;
    gap: 12px;
    z-index: 99;
  }
  .nav-btn {
    flex: 1;
    padding: 13px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    font-family: inherit;
  }
  .nav-btn:active { transform: scale(0.97); }
  .btn-next {
    background: linear-gradient(135deg, #FF6B35, #FF4E4E);
    color: #fff;
  }
  .btn-submit {
    background: linear-gradient(135deg, #52C41A, #389E0D);
    color: #fff;
  }
  .btn-prev {
    background: #F0F0F5;
    color: var(--text);
    flex: 0 0 52px;
  }

  /* ── Result Screen ── */
  .result-screen {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }
  .result-screen.show { display: block; }
  .result-emoji { font-size: 72px; margin-bottom: 12px; }
  .result-title { font-size: 26px; font-weight: 800; margin-bottom: 8px; color: var(--text); }
  .result-sub { color: var(--text-light); font-size: 14px; line-height: 1.7; }
  .score-ring {
    width: 120px; height: 120px;
    margin: 20px auto;
    border-radius: 50%;
    background: conic-gradient(#FF6B35 0deg, #FF6B35 var(--deg), #FFD5C5 var(--deg), #FFD5C5 360deg);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .score-ring::after {
    content: '';
    position: absolute;
    width: 86px; height: 86px;
    background: #fff;
    border-radius: 50%;
  }
  .score-inner {
    z-index: 2;
    font-size: 26px;
    font-weight: 800;
    color: var(--primary);
  }
  .result-details {
    display: flex; justify-content: center; gap: 20px;
    margin: 20px 0 30px;
  }
  .r-detail {
    background: #F8F8FB;
    border-radius: 12px;
    padding: 14px 20px;
    text-align: center;
  }
  .r-detail-num { font-size: 20px; font-weight: 800; }
  .r-detail-label { font-size: 12px; color: var(--text-light); margin-top: 3px; }
  .green { color: var(--done); }
  .red { color: var(--wrong); }
  .btn-done {
    display: block;
    width: 100%;
    max-width: 320px;
    margin: 0 auto 12px;
    padding: 15px;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-done-primary { background: linear-gradient(135deg, #FF6B35, #FF4E4E); color: #fff; }
  .btn-done-secondary { background: #F0F0F5; color: var(--text); }

  /* ── Loading ── */
  #loadingScreen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999;
    gap: 14px;
  }
  .spin {
    width: 40px; height: 40px;
    border: 4px solid #FFD5C5;
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loadingScreen">
  <div class="spin"></div>
  <div style="color:var(--text-light);font-size:14px;">题目加载中…</div>
</div>

<div id="mainApp" style="display:none">

  <div class="topbar">
    <a href="index.html" class="back-btn">‹</a>
    <div class="topbar-info">
      <div class="topbar-title" id="lessonTitle">加载中…</div>
      <div class="topbar-sub" id="lessonSub"></div>
    </div>
    <div class="topbar-day" id="dayBadge">Day --</div>
  </div>

  <div class="q-progress" id="qProgress"></div>

  <div class="q-area" id="qArea"></div>

  <div class="bottom-nav" id="bottomNav">
    <button class="nav-btn btn-prev" id="btnPrev" onclick="prevQ()">‹</button>
    <button class="nav-btn btn-next" id="btnNext" onclick="nextOrSubmit()">下一题</button>
  </div>

  <div class="result-screen" id="resultScreen">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-title" id="resultTitle">打卡成功！</div>
    <div class="result-sub" id="resultSub"></div>
    <div class="score-ring" id="scoreRing">
      <div class="score-inner" id="scoreInner">0/11</div>
    </div>
    <div class="result-details">
      <div class="r-detail">
        <div class="r-detail-num green" id="correctNum">0</div>
        <div class="r-detail-label">答对</div>
      </div>
      <div class="r-detail">
        <div class="r-detail-num red" id="wrongNum">0</div>
        <div class="r-detail-label">答错</div>
      </div>
      <div class="r-detail">
        <div class="r-detail-num" id="timeNum">0s</div>
        <div class="r-detail-label">用时</div>
      </div>
    </div>
    <button class="btn-done btn-done-primary" onclick="goHome()">返回首页 🏠</button>
    <button class="btn-done btn-done-secondary" onclick="retryDay()">再练一次</button>
  </div>

</div>

<script>
// =============================================
// 20天完整题目数据
// =============================================
const ALL_LESSONS = {

// ══════════════════════════════════════════════

// 语法：请求许可及回应 | 词汇：class, eraser, ruler, crayon, pencil case, use
// ══════════════════════════════════════════════
1: {
  title: "请求许可 Can I...?", sub: "Can I use your...? · 文具词汇",
  vocab: [
    { q: ""橡皮" 的英文是：", opts: ["A. ruler", "B. eraser", "C. crayon", "D. pen"], ans: 1 },
    { q: ""蜡笔" 的英文是：", opts: ["A. pencil", "B. ruler", "C. crayon", "D. pen"], ans: 2 },

  sentence: { words: ["Can", "I", "your", "use", "eraser", "?"], answer: "Can I use your eraser ?" }

// ══════════════════════════════════════════════
// Day 2 · have got 拥有句型
// 语法：表达拥有某物 | 词汇：watch, bottle, toothbrush, handbag, raincoat, sweater
// ══════════════════════════════════════════════
2: {

    { q: ""手表" 的英文是：", opts: ["A. clock", "B. watch", "C. phone", "D. ring"], ans: 1 },

    { q: ""手提包" 的英文是：", opts: ["A. backpack", "B. handbag", "C. suitcase", "D. pocket"], ans: 1 },
    { q: ""雨衣" 的英文是：", opts: ["A. raincoat", "B. sweater", "C. jacket", "D. coat"], ans: 0 },
    { q: ""毛衣" 的英文是：", opts: ["A. shirt", "B. coat", "C. raincoat", "D. sweater"], ans: 3 },
  ],
  grammar: [
    { q: "I ___ a new watch.", opts: ["A. have got", "B. has got", "C. got have", "D. am got"], ans: 0 },
    { q: "She ___ a blue handbag.", opts: ["A. have got", "B. has got", "C. is got", "D. got"], ans: 1 },
    { q: "I've got ___ bottle.", opts: ["A. a", "B. an", "C. the", "D. some"], ans: 0 },

  ],
  sentence: { words: ["got", "I've", "a", "new", "raincoat", "."], answer: "I've got a new raincoat ." }

// Day 3 · Have you got...? 一般疑问句
// 语法：询问是否拥有 | 词汇：doll, ball, kite, phone, helicopter, motorbike
// ══════════════════════════════════════════════
3: {
  title: "Have you got...?", sub: "一般疑问句·是否拥有 · 玩具",
  vocab: [
    { q: ""洋娃娃" 的英文是：", opts: ["A. toy", "B. doll", "C. ball", "D. bear"], ans: 1 },
    { q: ""风筝" 的英文是：", opts: ["A. kite", "B. ball", "C. helicopter", "D. plane"], ans: 0 },
    { q: ""直升机" 的英文是：", opts: ["A. plane", "B. kite", "C. helicopter", "D. rocket"], ans: 2 },
    { q: ""摩托车" 的英文是：", opts: ["A. bicycle", "B. motorbike", "C. scooter", "D. car"], ans: 1 },

  grammar: [

  ],
  sentence: { words: ["got", "Have", "you", "a", "kite", "?"], answer: "Have you got a kite ?" }

// ══════════════════════════════════════════════

// ══════════════════════════════════════════════
// Day 5 · Would you like...? 邀请用餐
// 语法：邀请用餐及应答 | 词汇：plate, candy, noodles, cupcake, dumplings, hot dog

    { q: "— Would you like ___ dumplings?\n— No, thank you.", opts: ["A. a", "B. an", "C. some", "D. any"], ans: 2 },
    { q: "— ___ you like a cupcake? — Yes, please.", opts: ["A. Do", "B. Would", "C. Are", "D. Can"], ans: 1 },
    { q: "Would you like some candy? 这句话的目的是：", opts: ["A. 询问对方能力", "B. 邀请对方吃东西", "C. 询问价格", "D. 表达命令"], ans: 1 },
  ],
  sentence: { words: ["you", "Would", "like", "some", "dumplings", "?"], answer: "Would you like some dumplings ?" }
},

// ══════════════════════════════════════════════
// Day 6 · 感官动词 with结构
// 语法：描述感官功能 | 词汇：smell, taste, touch, tongue, plane, smoke
// ══════════════════════════════════════════════
6: {
  title: "感官动词 with结构", sub: "I see/hear with my... · 感官词汇",

}; // END ALL_LESSONS

// =============================================
// App State
// =============================================
let dayNum = 1;
let lesson = null;
let questions = [];
let currentQ = 0;
let answers = {};
let startTime = Date.now();

// =============================================
// Init
// =============================================
function init() {
  const params = new URLSearchParams(window.location.search);
  dayNum = parseInt(params.get('day')) || 1;
  lesson = ALL_LESSONS[dayNum];
  if (!lesson) { window.location.href = 'index.html'; return; }

  document.getElementById('lessonTitle').textContent = lesson.title;
  document.getElementById('lessonSub').textContent = lesson.sub;
  document.getElementById('dayBadge').textContent = `Day ${dayNum}`;
  document.title = `Day ${dayNum} · ${lesson.title}`;

  // Build question list
  questions = [];
  lesson.vocab.forEach((q, i) => questions.push({ type: 'vocab', ...q, idx: i }));
  lesson.grammar.forEach((q, i) => questions.push({ type: 'grammar', ...q, idx: i }));
  questions.push({ type: 'sentence', ...lesson.sentence });

  startTime = Date.now();
  renderQ(0);

  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
}

// =============================================
// Render Question
// =============================================
function renderQ(idx) {
  currentQ = idx;
  const q = questions[idx];
  const isLast = idx === questions.length - 1;

  // Progress dots
  const pEl = document.getElementById('qProgress');
  pEl.innerHTML = questions.map((qq, i) => {
    let cls = '';
    if (answers[i] !== undefined) {
      cls = answers[i].correct ? 'correct' : 'wrong';
    } else if (i === idx) cls = 'answered';
    return `<div class="q-dot ${cls}"></div>`;
  }).join('') + `<span class="q-counter">${idx + 1}/${questions.length}</span>`;

  // Type badge
  const badgeMap = { vocab: '词汇题', grammar: '语法题', sentence: '连词成句' };
  const badgeClass = { vocab: 'badge-vocab', grammar: 'badge-grammar', sentence: 'badge-sentence' };

  const qArea = document.getElementById('qArea');
  qArea.innerHTML = '';

  const badge = document.createElement('div');
  badge.className = `q-type-badge ${badgeClass[q.type]}`;
  badge.textContent = badgeMap[q.type];
  qArea.appendChild(badge);

  const card = document.createElement('div');
  card.className = 'q-card';

  if (q.type === 'sentence') {
    renderSentence(card, q, idx);
  } else {
    renderMC(card, q, idx);
  }

  qArea.appendChild(card);

  // Bottom nav
  const btnNext = document.getElementById('btnNext');
  const btnPrev = document.getElementById('btnPrev');
  btnPrev.style.display = idx === 0 ? 'none' : 'block';
  btnNext.textContent = isLast ? '提交打卡' : '下一题';
  btnNext.className = `nav-btn ${isLast ? 'btn-submit' : 'btn-next'}`;
}

// ── Multiple Choice ──
function renderMC(card, q, idx) {
  const done = answers[idx] !== undefined;
  const userAns = done ? answers[idx].userAns : -1;

  card.innerHTML = `
    <div class="q-num">第 ${idx + 1} 题</div>
    <div class="q-text">${q.q}</div>
    <div class="options" id="opts"></div>
    <div class="answer-tip" id="tip"></div>
  `;

  const opts = card.querySelector('#opts');
  q.opts.forEach((opt, oi) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.disabled = done;
    let cls = '';
    if (done) {
      if (oi === q.ans) cls = 'correct';
      else if (oi === userAns) cls = 'wrong';
    }
    btn.className = `option-btn ${cls}`;
    btn.innerHTML = `<span class="opt-key">${String.fromCharCode(65 + oi)}</span>${opt}`;
    if (!done) btn.onclick = () => selectOption(idx, oi, q.ans);
    opts.appendChild(btn);
  });

  if (done) {
    const tip = card.querySelector('#tip');
    if (answers[idx].correct) {
      tip.className = 'answer-tip correct';
      tip.textContent = '✓ 回答正确！';
    } else {
      tip.className = 'answer-tip wrong';
      tip.textContent = `✗ 正确答案是 ${q.opts[q.ans]}`;
    }
  }
}

function selectOption(qIdx, chosen, correct) {
  const isCorrect = chosen === correct;
  answers[qIdx] = { userAns: chosen, correct: isCorrect };
  renderQ(qIdx);
}

// ── Sentence Builder ──
let placedWords = [];
function renderSentence(card, q, idx) {
  const done = answers[idx] !== undefined;
  if (!done) placedWords = [];

  const shuffled = done ? null : shuffle([...q.words]);

  card.innerHTML = `
    <div class="q-num">第 ${idx + 1} 题（连词成句）</div>
    <div class="q-text">将下面的单词排列成正确的句子：</div>
    <div class="sentence-area ${done ? (answers[idx].correct ? 'correct' : 'wrong') : ''}" id="sentArea"></div>
    <div class="hint-area">${done ? '' : '点击单词加入句子，点击句子中的单词可移除'}</div>
    <div class="answer-tip" id="sentTip"></div>
    ${!done ? `<div class="words-source" id="wordSource"></div>` : ''}
  `;

  const sentArea = card.querySelector('#sentArea');

  if (done) {
    const displayWords = answers[idx].userAns;
    displayWords.forEach(w => {
      const chip = document.createElement('span');
      chip.className = 'placed-chip';
      chip.style.cursor = 'default';
      chip.textContent = w;
      sentArea.appendChild(chip);
    });
    const tip = card.querySelector('#sentTip');
    if (answers[idx].correct) {
      tip.className = 'answer-tip correct';
      tip.textContent = '✓ 句子正确！';
    } else {
      tip.className = 'answer-tip wrong';
      tip.textContent = `✗ 正确句子：${q.answer}`;
    }
    return;
  }

  // Render source chips
  const src = card.querySelector('#wordSource');
  shuffled.forEach((w, wi) => {
    const chip = document.createElement('span');
    chip.className = 'word-chip';
    chip.dataset.wi = wi;
    chip.textContent = w;
    chip.onclick = () => addWord(w, wi, chip, sentArea, idx, q);
    src.appendChild(chip);
  });

  // Render placed
  function refreshPlaced() {
    sentArea.innerHTML = '';
    placedWords.forEach((item, pi) => {
      const chip = document.createElement('span');
      chip.className = 'placed-chip';
      chip.textContent = item.word;
      chip.onclick = () => removeWord(pi, src, sentArea, idx, q);
      sentArea.appendChild(chip);
    });
  }
  refreshPlaced();

  // save refresh fn
  sentArea._refresh = refreshPlaced;
}

function addWord(word, wi, chipEl, sentArea, qIdx, q) {
  chipEl.classList.add('used');
  chipEl.onclick = null;
  placedWords.push({ word, wi, chipEl });
  sentArea._refresh();
}

function removeWord(pi, src, sentArea, qIdx, q) {
  const item = placedWords[pi];
  placedWords.splice(pi, 1);
  item.chipEl.classList.remove('used');
  item.chipEl.onclick = () => addWord(item.word, item.wi, item.chipEl, sentArea, qIdx, q);
  sentArea._refresh();
}

function submitSentence(qIdx, q) {
  if (placedWords.length === 0) { alert('请先排列单词！'); return; }
  const userSent = placedWords.map(i => i.word).join(' ');
  const isCorrect = userSent === q.answer;
  answers[qIdx] = { userAns: placedWords.map(i => i.word), correct: isCorrect };
  renderQ(qIdx);
}

// =============================================
// Navigation
// =============================================
function nextOrSubmit() {
  const q = questions[currentQ];
  if (answers[currentQ] === undefined) {
    if (q.type === 'sentence') {
      submitSentence(currentQ, q);
      return;
    } else {
      alert('请先选择答案！');
      return;
    }
  }
  if (currentQ === questions.length - 1) {
    showResult();
  } else {
    renderQ(currentQ + 1);
  }
}

function prevQ() {
  if (currentQ > 0) renderQ(currentQ - 1);
}

// =============================================
// Results
// =============================================
function showResult() {
  const elapsed = Math.round((Date.now() - startTime) / 1000);
  const correct = Object.values(answers).filter(a => a.correct).length;
  const wrong = questions.length - correct;
  const score = Math.round((correct / questions.length) * 100);

  document.getElementById('qArea').style.display = 'none';
  document.getElementById('qProgress').style.display = 'none';
  document.getElementById('bottomNav').style.display = 'none';

  const rs = document.getElementById('resultScreen');
  rs.classList.add('show');

  let emoji = '😊', title = '继续加油！';
  if (score >= 90) { emoji = '🎉'; title = '超棒！满分在望！'; }
  else if (score >= 70) { emoji = '👍'; title = '不错哦，继续努力！'; }
  else if (score >= 50) { emoji = '💪'; title = '加油，进步空间很大！'; }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSub').textContent = `Day ${dayNum} · ${lesson.title} 打卡完成！`;

  document.getElementById('correctNum').textContent = correct;
  document.getElementById('wrongNum').textContent = wrong;
  document.getElementById('timeNum').textContent = elapsed < 60 ? `${elapsed}s` : `${Math.floor(elapsed/60)}m${elapsed%60}s`;
  document.getElementById('scoreInner').textContent = `${score}%`;
  const deg = Math.round((score / 100) * 360);
  document.getElementById('scoreRing').style.setProperty('--deg', deg + 'deg');

  // Save to localStorage
  const progress = JSON.parse(localStorage.getItem('checkinProgress') || '{}');
  progress[dayNum] = 'done';
  localStorage.setItem('checkinProgress', JSON.stringify(progress));
}

function goHome() { window.location.href = 'index.html'; }
function retryDay() { window.location.reload(); }

// =============================================
// Util
// =============================================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Start
window.onload = init;
</script>
