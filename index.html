// ================ GLOBALS ================
var day=null,vs=0,gs=0,sc=0,vd=0,gd=0,sd=0,st=0,pw=[];

function RP(){
  var done=0;
  for(var i=1;i<=21;i++){var d=JSON.parse(localStorage.getItem("cd"+i)||"{}");if(d.s)done++;}
  document.getElementById("doneCount").textContent=done;
  document.getElementById("progressFraction").textContent=done;
  document.getElementById("progressBar").style.width=Math.round(done/21*100)+"%";
  var cc=document.getElementById("cardsContainer");
  cc.innerHTML="";
  for(var i=1;i<=21;i++){
    var d=JSON.parse(localStorage.getItem("cd"+i)||"{}");
    var L=LESSONS[i];
    var div=document.createElement("div");
    div.className="day-card"+(d.s?" done":"");
    div.innerHTML='<div class="card-body">'+
      '<div class="card-badge"><span class="badge-dot">Day'+i+'</span><span class="badge-text">'+(d.s?'已完成':'未打卡')+'</span></div>'+
      '<div class="card-title">'+L.t+'</div>'+
      '<div class="card-example">'+L.e+'</div>'+
      '<div class="card-desc">'+L.d+'</div>'+
      (d.s?'<span class="card-tag">✅ 已完成</span>':'')+
      '</div>'+
      '<div class="card-footer">'+
      '<div class="card-check">'+(d.s?'✅':(d.p?d.p+'%':'—'))+'</div>'+
      '<button class="card-btn">'+(d.s?'复习':'开始打卡')+'</button>'+
      '</div>';
    div.onclick=function(day){return function(){OM(day);}}(i);
    cc.appendChild(div);
  }
}

function OM(nd){
  day=nd; var L=LESSONS[nd];
  document.getElementById("modalTitle").textContent="Day "+nd+" · "+L.t;
  document.getElementById("modalOverlay").classList.add("show");
  vs=0;gs=0;sc=false;vd=0;gd=0;sd=false;st=Date.now();pw=[];
  var b=document.getElementById("modalBody");
  var h="";
  h+='<div class="section-title"><span class="badge badge-vocab">词</span>词汇选择（'+L.v.length+'题）</div>';
  L.v.forEach(function(q,i){
    h+='<div class="q-card" id="vc'+i+'"><div class="q-text">'+(i+1)+'. '+q.q+'</div><div class="opts">';
    q.o.forEach(function(o,j){h+='<div class="opt" onclick="PV('+i+','+j+')">'+o+'</div>';});
    h+='</div><div class="feedback" id="fv'+i+'"></div></div>';
  });
  h+='<div class="section-title"><span class="badge badge-grammar">语</span>语法选择（'+L.g.length+'题）</div>';
  L.g.forEach(function(q,i){
    h+='<div class="q-card" id="gc'+i+'"><div class="q-text">'+(i+1)+'. '+q.q+'</div><div class="opts">';
    q.o.forEach(function(o,j){h+='<div class="opt" onclick="PG('+i+','+j+')">'+o+'</div>';});
    h+='</div><div class="feedback" id="fg'+i+'"></div></div>';
  });
  h+='<div class="section-title"><span class="badge badge-sentence">句</span>连词成句</div>';
  h+='<div class="q-card" id="sCard"><div class="words-area" id="pA"></div><div class="words-area" id="poA"></div><div class="sentence-actions"><button class="btn btn-reset" onclick="RS()">重置</button><button class="btn btn-check" id="cSB" disabled onclick="CS()">检查</button></div><div class="feedback" id="fs"></div></div>';
  h+='<div class="done-panel" id="DP"><div class="score-ring" id="SR">--</div><div style="font-size:16px;color:#333;margin-bottom:4px;">打卡完成！</div><div class="stats"><div class="stat-item"><div class="sn" id="sVocab">--</div><div class="sl">词汇正确</div></div><div class="stat-item"><div class="sn" id="sGrammar">--</div><div class="sl">语法正确</div></div><div class="stat-item"><div class="sn" id="sTime">--</div><div class="sl">用时(秒)</div></div></div><button class="btn-submit" onclick="SC()">📌 提交打卡</button></div>';
  b.innerHTML=h;
  IS();
}

function CM(){document.getElementById("modalOverlay").classList.remove("show");day=null;RP();}

function IS(){
  var L=LESSONS[day],w=[].concat(L.s.w);
  for(var i=w.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=w[i];w[i]=w[j];w[j]=t;}
  var po=document.getElementById("poA"),pl=document.getElementById("pA"),cb=document.getElementById("cSB"),fb=document.getElementById("fs");
  po.innerHTML="";pl.innerHTML="";pw=[];pl.classList.remove("filled");cb.disabled=true;fb.className="feedback";fb.textContent="";sd=false;sc=false;
  w.forEach(function(w,idx){
    var c=document.createElement("span");c.className="word-chip pool";c.textContent=w;
    c.onclick=function(){AW(idx);};c.id="cp"+idx;po.appendChild(c);
  });
}
function AW(idx){
  var c=document.getElementById("cp"+idx);if(!c||c.classList.contains("used"))return;
  c.classList.add("used");
  var p=document.createElement("span");p.className="word-chip placed";p.textContent=c.textContent;
  p.onclick=function(){RW(p,idx);};
  document.getElementById("pA").appendChild(p);pw.push({e:p,i:idx});
  document.getElementById("pA").classList.add("filled");
  document.getElementById("cSB").disabled=pw.length!==LESSONS[day].s.w.length;
}
function RW(el,idx){el.remove();pw=pw.filter(function(p){return p.e!==el;});var c=document.getElementById("cp"+idx);if(c)c.classList.remove("used");if(!pw.length)document.getElementById("pA").classList.remove("filled");document.getElementById("cSB").disabled=true;}
function RS(){IS();}
function CS(){
  if(sd)return;sd=true;var L=LESSONS[day];
  var u=pw.map(function(p){return p.e.textContent;}).join(" ");
  var fb=document.getElementById("fs");
  if(u===L.s.a){sc=true;fb.className="feedback fb-ok show";fb.textContent="✅ 完全正确！";}
  else{fb.className="feedback fb-err show";fb.textContent="❌ 正确答案："+L.s.a;}
  document.getElementById("cSB").disabled=true;TF();
}

function PV(qi,oi){
  var c=document.getElementById("vc"+qi);if(!c||c.dataset.d==="1")return;c.dataset.d="1";
  var L=LESSONS[day],q=L.v[qi],os=c.querySelectorAll(".opt");
  os.forEach(function(o,j){o.classList.add("dim");if(j===q.a)o.classList.add("correct");if(j===oi&&j!==q.a)o.classList.add("wrong");});
  var fb=document.getElementById("fv"+qi);
  if(oi===q.a){vs++;fb.className="feedback fb-ok show";fb.textContent="✅ 正确！";}
  else{fb.className="feedback fb-err show";fb.textContent="❌ 正确答案："+q.o[q.a];}
  vd++;TF();
}
function PG(qi,oi){
  var c=document.getElementById("gc"+qi);if(!c||c.dataset.d==="1")return;c.dataset.d="1";
  var L=LESSONS[day],q=L.g[qi],os=c.querySelectorAll(".opt");
  os.forEach(function(o,j){o.classList.add("dim");if(j===q.a)o.classList.add("correct");if(j===oi&&j!==q.a)o.classList.add("wrong");});
  var fb=document.getElementById("fg"+qi);
  if(oi===q.a){gs++;fb.className="feedback fb-ok show";fb.textContent="✅ 正确！";}
  else{fb.className="feedback fb-err show";fb.textContent="❌ 正确答案："+q.o[q.a];}
  gd++;TF();
}

function TF(){
  var L=LESSONS[day];
  if(vd>=L.v.length&&gd>=L.g.length&&sd){
    var tc=vs+gs+(sc?1:0),tq=L.v.length+L.g.length+1,el=Math.round((Date.now()-st)/1000),pct=Math.round(tc/tq*100);
    var p=document.getElementById("DP");p.classList.add("show");
    document.getElementById("SR").textContent=pct+"%";
    document.getElementById("sVocab").textContent=vs+"/"+L.v.length;
    document.getElementById("sGrammar").textContent=gs+"/"+L.g.length;
    document.getElementById("sTime").textContent=el;
    p.scrollIntoView({behavior:"smooth"});
    var k="cd"+day;localStorage.setItem(k,JSON.stringify({s:false,p:pct,t:el,d:new Date().toISOString()}));
  }
}
function SC(){
  var k="cd"+day,ex=JSON.parse(localStorage.getItem(k)||"{}");
  localStorage.setItem(k,JSON.stringify({s:true,p:ex.p||0,t:ex.t||0,d:ex.d||new Date().toISOString()}));
  alert("✅ 打卡成功！");CM();
}

RP();
</script>
</body>
</html>
